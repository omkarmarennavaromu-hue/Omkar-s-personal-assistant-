<!DOCTYPE html>
<html>
<head>
  <title>AI Assistant</title>
  <style>
    body { font-family: sans-serif; margin: 20px; }
    textarea { width: 100%; height: 100px; }
    button { padding: 10px; margin-top: 10px; }
    #reply { margin-top: 20px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h2>AI Assistant</h2>
  <textarea id="userMessage" placeholder="Type here..."></textarea><br>
  <button onclick="sendMessage()">Send</button>
  <button onclick="startListening()">🎤 Speak</button>
  <p id="reply"></p>

  <script>
    async function sendMessage() {
      const message = document.getElementById("userMessage").value;
      if (!message) return;

      const res = await fetch("/api/assistant", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message })
      });

      const data = await res.json();
      document.getElementById("reply").innerText = data.reply;
      speak(data.reply);
    }

    // Voice input
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.onresult = (e) => {
      document.getElementById("userMessage").value = e.results[0][0].transcript;
      sendMessage();
    };
    function startListening() { recognition.start(); }

    // Voice output
    function speak(text) {
      const utter = new SpeechSynthesisUtterance(text);
      speechSynthesis.speak(utter);
    }
  </script>
</body>
</html>
